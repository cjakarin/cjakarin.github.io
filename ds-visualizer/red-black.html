<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red-Black Tree (Self-Balancing BST)</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script src="js/common.js"></script>
  <script src="js/cpp-sources.js"></script>
  <script src="js/view-builder.js"></script>
  <script src="js/red-black.js"></script>
  <script>
    try {
    const { el, ICONS } = window.DS;
    const Playback = window.DS.Playback;

    let allValues = [10, 20, 30, 15, 25, 5];   // sample sequence (will trigger Cases 1-3)
    let root = window.RB_TREE.makeInitial(allValues);
    let valueInput = '35';
    let speed = 700;

    const playback = new Playback({ speed, renderer: () => renderAll() });

    const handles = window.DS_VIEW.buildViewPage({
      title: 'Red-Black Tree',
      subtitle: 'Self-balancing BST · 5 properties (RED/BLACK + black-height) · fixInsert Case 1-3 + mirror · height ∈ O(log n)',
      iconHtml: ICONS.listChecks,
      iconClass: 'stack',
      opsConfig: {
        sections: [
          {
            title: 'INSERT', barColor: 'emerald',
            inputs: [
              { type: 'number', id: 'value', placeholder: 'ค่าที่จะ insert', value: valueInput, onChange: (v) => valueInput = v },
            ],
            buttons: [
              { label: 'Insert', icon: ICONS.plus, kind: 'btn-primary', onClick: () => runInsert() },
            ],
          },
        ],
        playback: {
          speed,
          onSpeedChange: (v) => { speed = v; playback.setSpeed(v); },
          onPlay: () => playback.play(),
          onPause: () => playback.pause(),
          onStepForward: () => playback.stepForward(),
          onStepBack: () => playback.stepBack(),
          isPlaying: false,
        },
        onClear: () => clearAll(),
        onReset: () => resetSample(),
      },
      legendItems: [
        { color: '#ef4444', label: 'RED', desc: 'RED node (อาจมี violation ถ้า parent เป็น RED)' },
        { color: '#1a1f29', label: 'BLACK', desc: 'BLACK node' },
        { color: '#f59e0b', label: 'current (z)', desc: 'node ที่กำลัง fixInsert' },
        { color: '#ec4899', label: 'target (parent)', desc: 'parent ที่เป็น RED' },
        { color: '#a855f7', label: 'prev (grandparent)', desc: 'grandparent (gp)' },
        { color: '#10b981', label: 'found', desc: 'หลัง balance เรียบร้อย' },
      ],
    });

    handles.opsPanel.querySelectorAll('.btn-grid-3 .btn, .btn-grid-2 .btn').forEach((b) => b.classList.add('btn-tall'));

    playback.onStateChange = (state) => {
      window.DS.updatePlaybackUI(handles.opsPanel, state);
      window.DS_VIEW.setProgress(handles.progressFill, state.index, state.total);
      handles.progressFill.classList.add('purple');
    };

    function runInsert() {
      const v = parseInt(valueInput, 10);
      if (Number.isNaN(v)) return;
      const result = window.RB_TREE.insert(root, v);
      allValues.push(v);
      root = result.root;
      playback.load(result.steps);
      playback.play();
    }

    function clearAll() {
      allValues = [];
      root = null;
      playback.load([]);
      renderAll();
    }
    function resetSample() {
      allValues = [10, 20, 30, 15, 25, 5];
      root = window.RB_TREE.makeInitial(allValues);
      playback.load([]);
      renderAll();
    }

    function renderAll() {
      const step = playback.current();
      if (step) {
        window.RB_TREE.render(handles.vizArea, handles.vizMeta, step);
        window.DS.renderDescAndConsole(handles.descBody, step, playback.index, playback.steps.length);
        window.DS.renderCodePanel(handles.codeBody, window.CPP_SOURCES.RB_TREE.insert, step.codeLines || []);
      } else {
        const serialized = window.RB_TREE.serialize(root);
        const idleStep = {
          operation: 'idle',
          description: '',
          codeLines: [],
          nodes: serialized.nodes,
          edges: serialized.edges,
          roles: {},
          consoleOutput: '',
          phase: 'current tree',
        };
        window.RB_TREE.render(handles.vizArea, handles.vizMeta, idleStep);
        window.DS.renderDescAndConsole(handles.descBody, null, 0, 0);
        window.DS.renderCodePanel(handles.codeBody, window.CPP_SOURCES.RB_TREE.insert, []);
      }
      window.DS_VIEW.setProgress(handles.progressFill, playback.index, playback.steps.length);
    }

    renderAll();
    } catch(e) { console.error('INLINE ERROR:', e.message, e.stack); document.title = 'ERROR: ' + e.message; }
  </script>
</body>
</html>
