<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Johnson's Algorithm (All-Pairs Shortest Path)</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script src="js/common.js"></script>
  <script src="js/cpp-sources.js"></script>
  <script src="js/view-builder.js"></script>
  <script src="js/johnson.js"></script>
  <script>
    try {
    const { el, ICONS } = window.DS;
    const Playback = window.DS.Playback;
    let speed = 700;
    const playback = new Playback({ speed, renderer: () => renderAll() });

    const handles = window.DS_VIEW.buildViewPage({
      title: "Johnson's Algorithm",
      subtitle: 'All-pairs shortest path สำหรับ sparse graph ที่มี negative edges · Bellman-Ford + Reweight + Dijkstra · O(V·E·log V)',
      iconHtml: ICONS.arrowRight,
      iconClass: 'queue',
      opsConfig: {
        sections: [
          {
            title: 'RUN', barColor: 'emerald',
            buttons: [
              { label: 'Run Johnson', icon: ICONS.play, kind: 'btn-primary', onClick: () => run() },
            ],
          },
        ],
        playback: {
          speed,
          onSpeedChange: (v) => { speed = v; playback.setSpeed(v); },
          onPlay: () => playback.play(),
          onPause: () => playback.pause(),
          onStepForward: () => playback.stepForward(),
          onStepBack: () => playback.stepBack(),
          isPlaying: false,
        },
        onClear: () => { playback.load([]); renderAll(); },
        onReset: () => { playback.load([]); renderAll(); },
      },
      legendItems: [
        { color: '#a855f7', label: 'S / source', desc: 'virtual source หรือ Dijkstra source' },
        { color: '#f59e0b', label: 'current', desc: 'node ที่กำลังประมวลผล' },
        { color: '#10b981', label: 'visited', desc: 'เยี่ยมแล้วใน Dijkstra' },
        { color: '#1a1f29', label: 'node', desc: 'node ปกติ' },
      ],
    });

    playback.onStateChange = (state) => {
      window.DS.updatePlaybackUI(handles.opsPanel, state);
      window.DS_VIEW.setProgress(handles.progressFill, state.index, state.total);
      handles.progressFill.classList.add('purple');
    };

    function run() {
      const steps = window.JOHNSON.run();
      playback.load(steps);
      playback.play();
    }

    function renderAll() {
      const step = playback.current();
      if (step) {
        window.JOHNSON.render(handles.vizArea, handles.vizMeta, step);
        window.DS.renderDescAndConsole(handles.descBody, step, playback.index, playback.steps.length);
        window.DS.renderCodePanel(handles.codeBody, window.CPP_SOURCES.JOHNSON.johnson, step.codeLines || []);
      } else {
        // Show initial graph
        const initialSteps = window.JOHNSON.run();
        const initial = initialSteps[0];
        window.JOHNSON.render(handles.vizArea, handles.vizMeta, initial);
        window.DS.renderDescAndConsole(handles.descBody, initial, 0, 0);
        window.DS.renderCodePanel(handles.codeBody, window.CPP_SOURCES.JOHNSON.johnson, []);
      }
      window.DS_VIEW.setProgress(handles.progressFill, playback.index, playback.steps.length);
    }

    renderAll();
    } catch(e) { console.error('INLINE ERROR:', e.message, e.stack); document.title = 'ERROR: ' + e.message; }
  </script>
</body>
</html>
