<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dijkstra's Shortest Path</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script src="js/common.js"></script>
  <script src="js/cpp-sources.js"></script>
  <script src="js/view-builder.js"></script>
  <script src="js/graph.js"></script>
  <script>
    try {
    const { el, ICONS } = window.DS;
    const Playback = window.DS.Playback;

    let sourceInput = '0';  // index 0 = 'A'
    let speed = 800;

    const playback = new Playback({ speed, renderer: () => renderAll() });

    const handles = window.DS_VIEW.buildViewPage({
      title: "Dijkstra's Shortest Path",
      subtitle: 'หาระยะสั้นสุดจาก source ไปทุก node · ใช้ relaxation + greedy',
      iconHtml: ICONS.arrowRight,
      iconClass: 'queue',
      opsConfig: {
        sections: [
          {
            title: 'CHOOSE SOURCE', barColor: 'emerald',
            inputs: [
              {
                type: 'select', id: 'source', value: sourceInput, onChange: (v) => sourceInput = v,
                options: [
                  { value: '0', label: 'A (index 0)' },
                  { value: '1', label: 'B (index 1)' },
                  { value: '2', label: 'C (index 2)' },
                  { value: '3', label: 'D (index 3)' },
                  { value: '4', label: 'E (index 4)' },
                  { value: '5', label: 'F (index 5)' },
                ],
              },
            ],
            buttons: [
              { label: 'Run Dijkstra', icon: ICONS.play, kind: 'btn-primary', onClick: () => runDijkstra() },
            ],
          },
        ],
        playback: {
          speed,
          onSpeedChange: (v) => { speed = v; playback.setSpeed(v); },
          onPlay: () => playback.play(),
          onPause: () => playback.pause(),
          onStepForward: () => playback.stepForward(),
          onStepBack: () => playback.stepBack(),
          isPlaying: false,
        },
        onClear: () => clearAll(),
        onReset: () => resetSample(),
      },
      legendItems: [
        { color: '#f59e0b', label: 'current', desc: 'กำลังประมวลผล' },
        { color: '#10b981', label: 'visited', desc: 'dist สั้นสุดแล้ว' },
        { color: '#a855f7', label: 'in queue', desc: 'รอประมวลผล' },
      ],
    });

    playback.onStateChange = (state) => {
      window.DS.updatePlaybackUI(handles.opsPanel, state);
      window.DS_VIEW.setProgress(handles.progressFill, state.index, state.total);
      handles.progressFill.classList.add('purple');
    };

    function runDijkstra() {
      const source = parseInt(sourceInput, 10) || 0;
      const steps = window.GRAPH.dijkstra(window.GRAPH.sample, source);
      playback.load(steps);
      playback.play();
    }

    function clearAll() {
      playback.load([]);
      renderAll();
    }
    function resetSample() {
      playback.load([]);
      renderAll();
    }

    function renderAll() {
      const step = playback.current();
      if (step) {
        window.GRAPH.render(handles.vizArea, handles.vizMeta, step, window.GRAPH.sample);
        window.DS.renderDescAndConsole(handles.descBody, step, playback.index, playback.steps.length);
        window.DS.renderCodePanel(handles.codeBody, window.CPP_SOURCES.DIJKSTRA.dijkstra, step.codeLines || []);
      } else {
        // Show graph with initial state (dist=∞, source=0)
        const initialStep = window.GRAPH.dijkstraInitial(window.GRAPH.sample, parseInt(sourceInput, 10) || 0);
        window.GRAPH.render(handles.vizArea, handles.vizMeta, initialStep, window.GRAPH.sample);
        window.DS.renderDescAndConsole(handles.descBody, initialStep, 0, 0);
        window.DS.renderCodePanel(handles.codeBody, window.CPP_SOURCES.DIJKSTRA.dijkstra, []);
      }
      window.DS_VIEW.setProgress(handles.progressFill, playback.index, playback.steps.length);
    }

    // Re-render when source changes (so initial state updates)
    document.getElementById('source').addEventListener('change', () => {
      if (playback.steps.length === 0) renderAll();
    });

    renderAll();
    } catch(e) { console.error('INLINE ERROR:', e.message, e.stack); document.title = 'ERROR: ' + e.message; }
  </script>
</body>
</html>
