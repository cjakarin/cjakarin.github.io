<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjan's Strongly Connected Components (SCC)</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script src="js/common.js"></script>
  <script src="js/cpp-sources.js"></script>
  <script src="js/view-builder.js"></script>
  <script src="js/tarjan-scc.js"></script>
  <script>
    try {
    const { el, ICONS } = window.DS;
    const Playback = window.DS.Playback;
    let speed = 700;
    const playback = new Playback({ speed, renderer: () => renderAll() });

    const handles = window.DS_VIEW.buildViewPage({
      title: "Tarjan's SCC",
      subtitle: 'Strongly Connected Components ด้วย DFS + low-link + stack · O(V+E) · single pass',
      iconHtml: ICONS.listChecks,
      iconClass: 'queue',
      opsConfig: {
        sections: [
          {
            title: 'RUN', barColor: 'emerald',
            buttons: [
              { label: 'Run Tarjan', icon: ICONS.play, kind: 'btn-primary', onClick: () => run() },
            ],
          },
        ],
        playback: {
          speed,
          onSpeedChange: (v) => { speed = v; playback.setSpeed(v); },
          onPlay: () => playback.play(),
          onPause: () => playback.pause(),
          onStepForward: () => playback.stepForward(),
          onStepBack: () => playback.stepBack(),
          isPlaying: false,
        },
        onClear: () => { playback.load([]); renderAll(); },
        onReset: () => { playback.load([]); renderAll(); },
      },
      legendItems: [
        { color: '#a855f7', label: 'current', desc: 'node ที่กำลัง strongconnect' },
        { color: '#f59e0b', label: 'neighbor', desc: ' neighbor ที่กำลังตรวจ' },
        { color: '#ec4899', label: 'popping', desc: 'node ที่กำลัง pop ออกจาก stack' },
        { color: '#10b981', label: 'SCC color', desc: 'สีของ SCC ที่พบ' },
        { color: '#1a1f29', label: 'unvisited', desc: 'idx=-1 ยังไม่ถูกเยี่ยม' },
      ],
    });

    handles.opsPanel.querySelectorAll('.btn-grid-3 .btn, .btn-grid-2 .btn').forEach((b) => b.classList.add('btn-tall'));

    playback.onStateChange = (state) => {
      window.DS.updatePlaybackUI(handles.opsPanel, state);
      window.DS_VIEW.setProgress(handles.progressFill, state.index, state.total);
      handles.progressFill.classList.add('purple');
    };

    function run() {
      const steps = window.TARJAN_SCC.run();
      playback.load(steps);
      playback.play();
    }

    function renderAll() {
      const step = playback.current();
      if (step) {
        window.TARJAN_SCC.render(handles.vizArea, handles.vizMeta, step);
        window.DS.renderDescAndConsole(handles.descBody, step, playback.index, playback.steps.length);
        window.DS.renderCodePanel(handles.codeBody, window.CPP_SOURCES.TARJAN_SCC.tarjan, step.codeLines || []);
      } else {
        const initialSteps = window.TARJAN_SCC.run();
        const initial = initialSteps[0];
        window.TARJAN_SCC.render(handles.vizArea, handles.vizMeta, initial);
        window.DS.renderDescAndConsole(handles.descBody, initial, 0, 0);
        window.DS.renderCodePanel(handles.codeBody, window.CPP_SOURCES.TARJAN_SCC.tarjan, []);
      }
      window.DS_VIEW.setProgress(handles.progressFill, playback.index, playback.steps.length);
    }

    renderAll();
    } catch(e) { console.error('INLINE ERROR:', e.message, e.stack); document.title = 'ERROR: ' + e.message; }
  </script>
</body>
</html>
