<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimum Spanning Tree (Prim + Kruskal)</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script src="js/common.js"></script>
  <script src="js/cpp-sources.js"></script>
  <script src="js/view-builder.js"></script>
  <script src="js/graph.js"></script>
  <script>
    try {
    const { el, ICONS } = window.DS;
    const Playback = window.DS.Playback;

    let algo = 'prim';
    let sourceInput = '0';
    let speed = 800;

    const playback = new Playback({ speed, renderer: () => renderAll() });

    const handles = window.DS_VIEW.buildViewPage({
      title: 'Minimum Spanning Tree',
      subtitle: 'Prim (greedy จาก source) · Kruskal (sort edges + DSU ตรวจ cycle)',
      iconHtml: ICONS.listChecks,
      iconClass: 'll',
      opsConfig: {
        sections: [
          {
            title: 'ALGORITHM', barColor: 'emerald',
            inputs: [
              {
                type: 'select', id: 'algo', value: algo, onChange: (v) => {
                  algo = v;
                  const srcWrap = document.getElementById('src-wrap');
                  if (srcWrap) srcWrap.style.display = v === 'prim' ? '' : 'none';
                },
                options: [
                  { value: 'prim', label: "Prim's Algorithm" },
                  { value: 'kruskal', label: "Kruskal's Algorithm" },
                ],
              },
            ],
            buttons: [
              { label: 'Run MST', icon: ICONS.play, kind: 'btn-primary', onClick: () => runMST() },
            ],
          },
          {
            title: 'SOURCE (Prim only)', barColor: 'amber',
            inputs: [
              {
                type: 'select', id: 'source', value: sourceInput, onChange: (v) => sourceInput = v,
                options: [
                  { value: '0', label: 'A (index 0)' },
                  { value: '1', label: 'B (index 1)' },
                  { value: '2', label: 'C (index 2)' },
                  { value: '3', label: 'D (index 3)' },
                  { value: '4', label: 'E (index 4)' },
                  { value: '5', label: 'F (index 5)' },
                ],
              },
            ],
          },
        ],
        playback: {
          speed,
          onSpeedChange: (v) => { speed = v; playback.setSpeed(v); },
          onPlay: () => playback.play(),
          onPause: () => playback.pause(),
          onStepForward: () => playback.stepForward(),
          onStepBack: () => playback.stepBack(),
          isPlaying: false,
        },
        onClear: () => clearAll(),
        onReset: () => resetSample(),
      },
      legendItems: [
        { color: '#f59e0b', label: 'current', desc: 'กำลังประมวลผล' },
        { color: '#10b981', label: 'in MST', desc: 'อยู่ใน MST แล้ว' },
        { color: '#ec4899', label: 'highlight', desc: 'edge ที่กำลังพิจารณา' },
        { color: '#ef4444', label: 'rejected', desc: 'เกิด cycle' },
      ],
    });

    playback.onStateChange = (state) => {
      window.DS.updatePlaybackUI(handles.opsPanel, state);
      window.DS_VIEW.setProgress(handles.progressFill, state.index, state.total);
      handles.progressFill.classList.add('purple');
    };

    function runMST() {
      let steps;
      if (algo === 'prim') {
        const source = parseInt(sourceInput, 10) || 0;
        steps = window.GRAPH.prim(window.GRAPH.sample, source);
      } else {
        steps = window.GRAPH.kruskal(window.GRAPH.sample);
      }
      playback.load(steps);
      playback.play();
    }

    function clearAll() {
      playback.load([]);
      renderAll();
    }
    function resetSample() {
      playback.load([]);
      renderAll();
    }

    function renderAll() {
      const step = playback.current();
      if (step) {
        window.GRAPH.render(handles.vizArea, handles.vizMeta, step, window.GRAPH.sample);
        window.DS.renderDescAndConsole(handles.descBody, step, playback.index, playback.steps.length);
        const cppSource = algo === 'prim' ? window.CPP_SOURCES.MST.prim : window.CPP_SOURCES.MST.kruskal;
        window.DS.renderCodePanel(handles.codeBody, cppSource, step.codeLines || []);
      } else {
        // Show graph with initial state
        const initialStep = algo === 'prim'
          ? window.GRAPH.primInitial(window.GRAPH.sample, parseInt(sourceInput, 10) || 0)
          : window.GRAPH.kruskalInitial(window.GRAPH.sample);
        window.GRAPH.render(handles.vizArea, handles.vizMeta, initialStep, window.GRAPH.sample);
        window.DS.renderDescAndConsole(handles.descBody, initialStep, 0, 0);
        const cppSource = algo === 'prim' ? window.CPP_SOURCES.MST.prim : window.CPP_SOURCES.MST.kruskal;
        window.DS.renderCodePanel(handles.codeBody, cppSource, []);
      }
      window.DS_VIEW.setProgress(handles.progressFill, playback.index, playback.steps.length);
    }

    // Re-render when algo or source changes (so initial state updates)
    document.getElementById('algo').addEventListener('change', () => {
      if (playback.steps.length === 0) renderAll();
    });
    document.getElementById('source').addEventListener('change', () => {
      if (playback.steps.length === 0 && algo === 'prim') renderAll();
    });

    renderAll();
    } catch(e) { console.error('INLINE ERROR:', e.message, e.stack); document.title = 'ERROR: ' + e.message; }
  </script>
</body>
</html>
